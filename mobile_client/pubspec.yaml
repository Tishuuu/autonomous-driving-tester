name: mobile_client
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # ספריות בסיס ועיצוב (הגרסאות החדשות)
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.0
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.4

  # ספריות חומרה (מצלמה וחיישנים)
  sensors_plus: ^6.1.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.1
  camera: ^0.11.4
  flutter_vision: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/ml_models/