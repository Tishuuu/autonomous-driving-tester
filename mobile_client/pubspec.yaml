name: mobile_client
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  crypto: ^3.0.3

  # ספריות חומרה (מצלמה וחיישנים)
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2
  permission_handler: ^11.3.1
  camera: ^0.11.4
  flutter_vision: ^2.0.0
  path_provider: ^2.1.5
  flutter_bluetooth_serial: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
  fonts:
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lexend-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lexend-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lexend-ExtraBold.ttf
          weight: 800
  